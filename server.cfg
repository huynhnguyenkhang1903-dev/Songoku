# ============================================================
# NETWORK CONFIGURATION
# ============================================================
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# ============================================================
# SERVER LICENSE
# ============================================================
sv_licenseKey "cfxk_PGtnbIFreeAOc0EkTjiA_3yWe9r"

# ============================================================
# SERVER INFO
# ============================================================
sv_hostname "Ricky Nika Roleplay - Server Mod Sẵn"
sets sv_projectName "Ricky Nika Roleplay"
sets sv_projectDesc "Server FiveM cài sẵn mod quần áo, vũ khí và xmenu."
sets tags "vietnamese, custom, weapons, clothes, xmenu"
sets locale "vi-VN"
# load_server_icon myLogo.png

# ============================================================
# GAME SETTINGS
# ============================================================
sv_enforceGameBuild 3570
sv_maxclients 2

# Tăng timeout loading screen cho phép tải resource lớn (gta5vn_addoncloth ~2.7GB)
sv_loadingScreenTimeout 600000

sv_scriptHookAllowed 0
sv_master1 ""

# ============================================================
# ONESYNC
# ============================================================
## [txAdmin CFG validator]: onesync MUST only be set in the txAdmin settings page.
# set onesync on
onesync_population false

# ============================================================
# SECURITY
# ============================================================
sv_authMinTrust 5
sv_endpointPrivacy true
sv_enhancedHostSupport true
set steam_webApiKey ""

# ============================================================
# PERMISSIONS
# ============================================================
add_ace group.admin command allow
add_ace group.admin command.quit deny

